name: tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies (CPU-only, no TF needed for these tests)
        run: |
          pip install numpy opencv-python-headless PyWavelets scipy scikit-learn pytest
      - name: Run unit tests
        run: |
          cd src && python -m pytest ../tests -v
